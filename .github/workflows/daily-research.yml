name: Daily Research

on:
  schedule:
    # 6:05 AM EDT (10:05 UTC) Mon-Fri
    # Note: shifts to 7:05 AM ET in winter (EST). Bot uses ET timezone internally.
    - cron: "5 10 * * 1-5"
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily research
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          PAPER_TRADING: "true"
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python main.py research

      - name: Commit research report to repo
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "research: $(date -u +%Y-%m-%d)"
          git push
