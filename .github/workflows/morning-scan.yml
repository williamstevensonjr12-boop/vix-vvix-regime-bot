name: Morning Scan

on:
  schedule:
    # 9:32 AM EDT (13:32 UTC) Mon-Fri — starts before ORB, Python waits for 9:45 AM
    - cron: "32 13 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max (entry window closes at 3:30 PM ET)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning scan
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          PAPER_TRADING: "true"
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python main.py scan

      - name: Commit trade journal to repo
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@noreply.github.com"
          git pull --rebase origin main || true
          git add trades.csv performance.csv trading_bot.log 2>/dev/null || true
          git diff --staged --quiet || git commit -m "trades: $(date -u +%Y-%m-%d)"
          git diff origin/main..HEAD --quiet || git push
